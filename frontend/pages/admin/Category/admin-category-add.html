<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thêm danh mục</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container py-5">
      <h2 class="mb-4">Thêm danh mục mới</h2>

      <div id="alertBox" class="alert d-none"></div>

      <form id="addCategoryForm" class="card p-4 shadow">
        <div class="mb-3">
          <label for="categoryName" class="form-label">Tên danh mục</label>
          <input type="text" class="form-control" id="categoryName" required />
        </div>
        <div class="mb-3">
          <label for="categoryDescription" class="form-label"
            >Mô tả danh mục (tuỳ chọn)</label
          >
          <textarea
            id="categoryDescription"
            class="form-control"
            rows="3"
          ></textarea>
        </div>
        <button type="submit" class="btn btn-success">Thêm danh mục</button>
        <a href="admin-category.html" class="btn btn-secondary ms-2"
          >Quay lại</a
        >
      </form>
    </div>

    <script>
      const API_URL = "http://localhost:5287/api/Categories";
      const token = localStorage.getItem("token");

      if (!token) {
        alert("Vui lòng đăng nhập trước.");
        window.location.href = "/pages/login.html";
      }

      function showAlert(msg, type = "success") {
        const alertBox = document.getElementById("alertBox");
        alertBox.className = `alert alert-${type}`;
        alertBox.textContent = msg;
        alertBox.classList.remove("d-none");
        setTimeout(() => alertBox.classList.add("d-none"), 3000);
      }

      document
        .getElementById("addCategoryForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const name = document.getElementById("categoryName").value.trim();
          const description = document
            .getElementById("categoryDescription")
            .value.trim();

          if (!name) {
            showAlert("Tên danh mục là bắt buộc", "danger");
            return;
          }

          const res = await fetch(API_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ name, description }),
          });

          const data = await res.json();

          if (res.ok) {
            alert("Thêm danh mục thành công!");
            window.location.href = "admin-category.html";
          } else {
            showAlert(data.message || "Lỗi thêm danh mục", "danger");
          }
        });
    </script>
  </body>
</html>
