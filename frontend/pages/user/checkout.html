<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Thanh Toán | Shopping Pet</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="../../css/components.css" />
    <link rel="stylesheet" href="../../css/user/checkout.css" />
    <style>
      body {
        background-color: #f5f7fa;
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <div id="header-container"></div>

    <div class="container my-5">
      <div class="row g-4">
        <!-- Thông tin giao hàng -->
        <div class="col-md-8">
          <div class="bg-white p-4 rounded shadow-sm border">
            <h4 class="mb-4">Thông tin giao hàng</h4>
            <div class="row g-2">
              <div class="col-md-6">
                <input
                  id="fullName"
                  class="form-control"
                  placeholder="Họ và tên *"
                />
              </div>
              <div class="col-md-6">
                <input
                  id="phone"
                  class="form-control"
                  placeholder="Số điện thoại *"
                />
              </div>
              <div class="col-12">
                <input id="email" class="form-control" placeholder="Email *" />
              </div>

              <!-- Địa chỉ tự động -->
              <div class="col-md-4">
                <select id="city" class="form-select">
                  <option value="">Chọn Tỉnh/Thành phố *</option>
                </select>
              </div>
              <div class="col-md-4">
                <select id="district" class="form-select">
                  <option value="">Chọn Quận/Huyện *</option>
                </select>
              </div>
              <div class="col-md-4">
                <select id="ward" class="form-select">
                  <option value="">Chọn Phường/Xã *</option>
                </select>
              </div>

              <div class="col-12">
                <input
                  id="address"
                  class="form-control"
                  placeholder="Số nhà, tên đường *"
                />
              </div>

              <div class="col-12">
                <textarea
                  id="note"
                  class="form-control"
                  placeholder="Ghi chú (tuỳ chọn)"
                ></textarea>
              </div>
            </div>

            <h5 class="mt-4">Phương thức thanh toán</h5>
            <div>
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  name="payment"
                  value="COD"
                  checked
                />
                <label class="form-check-label"
                  >Thanh toán khi nhận hàng (COD)</label
                >
              </div>
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  name="payment"
                  value="Bank"
                />
                <label class="form-check-label">Chuyển khoản ngân hàng</label>
              </div>
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  name="payment"
                  value="Momo"
                />
                <label class="form-check-label">Ví MoMo</label>
              </div>
            </div>

            <button class="btn btn-primary mt-4" onclick="submitOrder()">
              Đặt hàng
            </button>
          </div>
        </div>

        <!-- Đơn hàng -->
        <div class="col-md-4">
          <div class="bg-white p-4 rounded shadow-sm border">
            <h5 class="mb-3">Đơn hàng của bạn</h5>
            <div id="orderSummary" class="bg-light border rounded p-3"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div id="footer-container"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/components/components.js"></script>
    <script src="../../js/user/checkout.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const userRaw = localStorage.getItem("user");
        const user = userRaw ? JSON.parse(userRaw) : null;

        let headerPath = "../../components/header.html";
        const roles = user?.roles || [];

        if (roles.includes("Admin")) {
          headerPath = "../../components/header-admin.html";
        } else if (roles.includes("Customer")) {
          headerPath = "../../components/header-user.html";
        }

        console.log("➡️ Đang load:", headerPath);

        fetch(headerPath)
          .then((res) => res.text())
          .then((html) => {
            document.getElementById("header-container").innerHTML = html;

            const script = document.createElement("script");
            script.src = "../../js/Login/header-auth.js";
            script.onload = () => console.log("✅ header-auth.js loaded");
            document.body.appendChild(script);
          });
      });
    </script>
  </body>
</html>
