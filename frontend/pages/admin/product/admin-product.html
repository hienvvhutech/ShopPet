<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Admin | Quản lý sản phẩm</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- CSS chính -->
    <link rel="stylesheet" href="../../../css/style.css" />
  </head>

  <body>
    <div class="container-fluid">
      <div class="row">
        <!-- HEADER / SIDEBAR -->
        <div class="col-3 p-0" id="header-container"></div>

        <!-- MAIN CONTENT -->
        <div class="col-9 py-4 px-5">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>📦 Danh sách sản phẩm</h2>
            <a href="admin-product-add.html" class="btn btn-success">
              ➕ Thêm sản phẩm
            </a>
          </div>

          <div class="mb-3">
            <input
              id="searchInput"
              type="text"
              class="form-control w-50"
              placeholder="🔍 Tìm theo tên sản phẩm..."
            />
          </div>

          <table class="table table-bordered align-middle">
            <thead class="table-light">
              <tr>
                <th>#</th>
                <th>Tên</th>
                <th>Danh mục</th>
                <th>Giá</th>
                <th>Mô tả</th>
                <th>Ảnh</th>
                <th>Kho</th>
                <th>Hành động</th>
              </tr>
            </thead>
            <tbody id="productTableBody">
              <tr>
                <td colspan="8" class="text-center">Đang tải...</td>
              </tr>
            </tbody>
          </table>

          <div class="d-flex justify-content-center mt-3">
            <ul class="pagination" id="pagination"></ul>
          </div>
        </div>
      </div>
    </div>

    <!-- JS ADMIN PRODUCT -->
    <script src="../../../js/Admin/product.js"></script>

    <!-- LOAD HEADER THEO ROLE -->
    <script>
      const userRaw = localStorage.getItem("user");
      const user = userRaw ? JSON.parse(userRaw) : null;
      const roles = user?.roles || [];

      let headerPath = "../../../components/header.html";

      if (roles.includes("Admin")) {
        headerPath = "../../../components/header-admin.html";
      } else if (roles.includes("Customer")) {
        headerPath = "../../../components/header-user.html";
      }

      fetch(headerPath)
        .then((res) => {
          if (!res.ok) throw new Error("Không load được header");
          return res.text();
        })
        .then((html) => {
          document.getElementById("header-container").innerHTML = html;

          const script = document.createElement("script");
          script.src = "../../../js/Login/header-auth.js";
          document.body.appendChild(script);
        })
        .catch((err) => {
          console.error("Lỗi load header:", err);
        });
    </script>
  </body>
</html>
