<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Admin | PetShop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="../../css/style.css" />
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <div class="col-3 p-0" id="header-container"></div>
        <div class="col-9 py-4 px-5" id="main-content">
          <h2 class="mb-4">👤 Quản lý tài khoản khách hàng</h2>
          <div class="mb-3 d-flex justify-content-between">
            <input
              type="text"
              id="searchInput"
              class="form-control w-25"
              placeholder="🔍 Tìm theo email..."
              oninput="handleSearch()"
            />
          </div>
          <div id="message" class="text-danger mb-2"></div>
          <div class="table-responsive">
            <table class="table table-bordered align-middle">
              <thead class="table-secondary">
                <tr>
                  <th>#</th>
                  <th>Email</th>
                  <th>Họ tên</th>
                  <th>Địa chỉ</th>
                  <th>Trạng thái</th>
                  <th>Hành động</th>
                </tr>
              </thead>
              <tbody id="userTableBody"></tbody>
            </table>
          </div>
          <div id="pagination" class="d-flex justify-content-center mt-3"></div>
          <script src="/js/Admin/customer.js"></script>
        </div>
      </div>
    </div>
    <script>
      const userRaw = localStorage.getItem("user");
      const user = userRaw ? JSON.parse(userRaw) : null;

      let headerPath = "/components/header.html";
      const roles = user?.roles || [];

      if (roles.includes("Admin")) {
        headerPath = "/components/header-admin.html";
      } else if (roles.includes("Customer")) {
        headerPath = "/components/header-user.html";
      }

      fetch(headerPath)
        .then((res) => res.text())
        .then((html) => {
          document.getElementById("header-container").innerHTML = html;
          const script = document.createElement("script");
          script.src = "/js/Login/header-auth.js";
          document.body.appendChild(script);
        });
    </script>
  </body>
</html>
