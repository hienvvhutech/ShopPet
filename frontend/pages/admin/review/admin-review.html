<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Admin | PetShop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="../../css/style.css" />
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <div class="col-3 p-0" id="header-container"></div>
        <div class="col-9 py-4 px-5" id="main-content">
          <h2 class="mb-4">📝 Quản lý đánh giá</h2>
          <div class="mb-3 row">
            <div class="col-md-6">
              <input
                type="text"
                id="searchInput"
                class="form-control"
                placeholder="🔍 Lọc theo tên sản phẩm..."
                oninput="renderReviews()"
              />
            </div>
            <div class="col-md-6">
              <select
                id="filterStatus"
                class="form-select"
                onchange="renderReviews()"
              >
                <option value="">📌 Tất cả</option>
                <option value="true">🚫 Đã ẩn</option>
                <option value="false">✅ Hiển thị</option>
              </select>
            </div>
          </div>
          <div id="message" class="text-danger mb-2"></div>
          <div class="table-responsive">
            <table class="table table-bordered align-middle">
              <thead class="table-secondary">
                <tr>
                  <th>ID</th>
                  <th>Sản phẩm</th>
                  <th>Người đánh giá</th>
                  <th>Rating</th>
                  <th>Bình luận</th>
                  <th>Thời gian</th>
                  <th>Trạng thái</th>
                  <th>Hành động</th>
                </tr>
              </thead>
              <tbody id="reviewTableBody"></tbody>
            </table>
          </div>
          <script src="/js/Admin/review-admin.js"></script>
        </div>
      </div>
    </div>
    <script>
      const userRaw = localStorage.getItem("user");
      const user = userRaw ? JSON.parse(userRaw) : null;

      let headerPath = "/components/header.html";
      const roles = user?.roles || [];

      if (roles.includes("Admin")) {
        headerPath = "/components/header-admin.html";
      } else if (roles.includes("Customer")) {
        headerPath = "/components/header-user.html";
      }

      fetch(headerPath)
        .then((res) => res.text())
        .then((html) => {
          document.getElementById("header-container").innerHTML = html;
          const script = document.createElement("script");
          script.src = "/js/Login/header-auth.js";
          document.body.appendChild(script);
        });
    </script>
  </body>
</html>
