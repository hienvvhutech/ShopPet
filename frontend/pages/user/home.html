<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PetShop</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/components.css" />
    <link rel="stylesheet" href="../../css/user/home.css" />
  </head>
  <body>
    <div id="header-container"></div>

    <main class="container mt-4 flex-fill">
      <div
        id="petShopCarousel"
        class="carousel slide mb-4"
        data-bs-ride="carousel"
      >
        <div class="carousel-inner">
          <div
            class="carousel-item active"
            style="
              background-image: url('https://www.vetad.net/wp-content/uploads/2018/10/Banner3-1.jpg');
            "
          >
            <div class="carousel-overlay">
              <div>
                <h1>Chào mừng đến với PetShop!</h1>
                <p>Mua sắm mọi thứ cho thú cưng của bạn với giá tốt nhất</p>
                <a href="products.html" class="btn btn-pink btn-lg mt-3"
                  >Khám phá ngay</a
                >
              </div>
            </div>
          </div>
          <div
            class="carousel-item"
            style="
              background-image: url('https://png.pngtree.com/thumb_back/fw800/background/20220827/pngtree-pet-shop-cat-and-dog-vector-background-image_1462686.jpg');
            "
          >
            <div class="carousel-overlay">
              <div>
                <h1>Yêu thương thú cưng của bạn</h1>
                <p>Khám phá các sản phẩm chất lượng cao cho bạn đồng hành</p>
                <a href="products.html" class="btn btn-pink btn-lg mt-3"
                  >Mua ngay</a
                >
              </div>
            </div>
          </div>
        </div>
        <button
          class="carousel-control-prev"
          type="button"
          data-bs-target="#petShopCarousel"
          data-bs-slide="prev"
        >
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Previous</span>
        </button>
        <button
          class="carousel-control-next"
          type="button"
          data-bs-target="#petShopCarousel"
          data-bs-slide="next"
        >
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
          <span class="visually-hidden">Next</span>
        </button>
      </div>
      <div class="text-center my-5">
        <h2 class="fw-bold">Sản phẩm</h2>
        <p class="text-muted mb-4">Những sản phẩm được yêu thích nhất</p>
        <div class="row" id="featuredProducts"></div>
        <a href="products.html" class="btn btn-pink mt-3"
          >Xem tất cả sản phẩm →</a
        >
      </div>
    </main>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/user/home-products.js"></script>
    <script src="../../js/components/chat-widget.js"></script>
    <script src="../../js/components/components.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const userRaw = localStorage.getItem("user");
        const user = userRaw ? JSON.parse(userRaw) : null;

        let headerPath = "../../components/header.html";
        const roles = user?.roles || [];

        if (roles.includes("Admin")) {
          headerPath = "../../components/header-admin.html";
        } else if (roles.includes("Customer")) {
          headerPath = "../../components/header-user.html";
        }

        console.log("➡️ Header path:", headerPath);

        fetch(headerPath)
          .then((res) => res.text())
          .then((html) => {
            document.getElementById("header-container").innerHTML = html;
            const script = document.createElement("script");
            script.src = "../../js/Login/header-auth.js";
            script.onload = () => console.log("✅ header-auth.js loaded");
            document.body.appendChild(script);
          });
      });
    </script>
  </body>
</html>
