<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Admin | PetShop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="../../css/style.css" />
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <div class="col-3 p-0" id="header-container"></div>
        <div class="col-9 py-4 px-5" id="main-content">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="mb-0">Danh sách danh mục</h2>
            <a href="admin-category-add.html" class="btn btn-success"
              >+ Thêm danh mục</a
            >
          </div>
          <div class="mb-3 row">
            <div class="col-md-6">
              <input
                type="text"
                id="searchInput"
                class="form-control"
                placeholder="🔍 Tìm theo tên danh mục..."
              />
            </div>
          </div>
          <div id="alertBox" class="alert d-none" role="alert"></div>
          <table class="table table-bordered table-striped">
            <thead class="table-dark">
              <tr>
                <th>ID</th>
                <th>Tên danh mục</th>
                <th>Mô tả</th>
                <th>Hành động</th>
              </tr>
            </thead>
            <tbody id="categoryTableBody"></tbody>
          </table>
          <div class="d-flex justify-content-center mt-3">
            <ul class="pagination" id="pagination"></ul>
          </div>
          <script src="/js/Admin/category.js"></script>
        </div>
      </div>
    </div>
    <script>
      const userRaw = localStorage.getItem("user");
      const user = userRaw ? JSON.parse(userRaw) : null;

      let headerPath = "/components/header.html";
      const roles = user?.roles || [];
      if (roles.includes("Admin")) {
        headerPath = "/components/header-admin.html";
      } else if (roles.includes("Customer")) {
        headerPath = "/components/header-user.html";
      }

      fetch(headerPath)
        .then((res) => res.text())
        .then((html) => {
          document.getElementById("header-container").innerHTML = html;
          const script = document.createElement("script");
          script.src = "/js/Login/header-auth.js";
          document.body.appendChild(script);
        });
    </script>
  </body>
</html>
