<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Giỏ hàng | Shopping Pet</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="../../css/components.css" />
    <link rel="stylesheet" href="../../css/user/cart.css" />
  </head>
  <body>
    <div id="header-container"></div>

    <div class="container my-5">
      <h3 class="mb-4 fw-bold">🛒 Giỏ hàng của bạn</h3>
      <div class="row">
        <div class="col-md-8" id="cartContainer">
          <div class="text-muted">Đang tải...</div>
        </div>

        <div class="col-md-4">
          <div class="border rounded p-4 shadow-sm">
            <h5 class="fw-bold mb-3">Tóm tắt đơn hàng</h5>
            <div class="d-flex justify-content-between">
              <span>Tạm tính:</span>
              <span id="subtotalText">0 đ</span>
            </div>
            <hr />
            <div class="d-flex justify-content-between fw-bold fs-5">
              <span>Tổng cộng:</span>
              <span id="totalText">0 đ</span>
            </div>

            <a href="checkout.html" class="btn btn-success w-100 mt-3"
              >Thanh toán</a
            >
            <a href="products.html" class="btn btn-outline-secondary w-100 mt-2"
              >Tiếp tục mua sắm</a
            >
          </div>
        </div>
      </div>
    </div>

    <div id="footer-container"></div>

    <script src="../../js/components/components.js"></script>
    <script src="../../js/user/cart.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const userRaw = localStorage.getItem("user");
        const user = userRaw ? JSON.parse(userRaw) : null;

        let headerPath = "../../components/header.html";
        const roles = user?.roles || [];

        if (roles.includes("Admin")) {
          headerPath = "../../components/header-admin.html";
        } else if (roles.includes("Customer")) {
          headerPath = "../../components/header-user.html";
        }

        console.log("➡️ Đang load:", headerPath);

        fetch(headerPath)
          .then((res) => res.text())
          .then((html) => {
            document.getElementById("header-container").innerHTML = html;

            const script = document.createElement("script");
            script.src = "../../js/Login/header-auth.js";
            script.onload = () => console.log("✅ header-auth.js loaded");
            document.body.appendChild(script);
          });
      });
    </script>
  </body>
</html>
