<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Chi tiết sản phẩm | Shopping Pet</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/style.css" />
    <link rel="stylesheet" href="../../css/components.css" />
    <style>
      :root {
        --primary-color: #6366f1;
        --secondary-color: #8b5cf6;
        --accent-color: #06b6d4;
        --success-color: #10b981;
        --warning-color: #f59e0b;
        --danger-color: #ef4444;
        --pink-gradient: linear-gradient(135deg, #ec4899, #be185d);
        --dark-color: #1f2937;
        --light-bg: #f8fafc;
        --border-color: #e2e8f0;
        --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
      }

      body {
        background-color: var(--light-bg);
        font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      }

      .breadcrumb-nav {
        background: white;
        padding: 1rem 0;
        border-bottom: 1px solid var(--border-color);
        margin-bottom: 2rem;
      }

      .breadcrumb {
        background: none;
        padding: 0;
        margin: 0;
      }

      .breadcrumb-item {
        color: #6b7280;
      }

      .breadcrumb-item.active {
        color: var(--dark-color);
      }

      .breadcrumb-item + .breadcrumb-item::before {
        content: "›";
        color: #9ca3af;
        font-weight: bold;
      }

      .back-link {
        color: var(--primary-color);
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s;
      }

      .back-link:hover {
        color: var(--secondary-color);
      }

      .product-card {
        background: white;
        border-radius: 20px;
        box-shadow: var(--shadow-lg);
        border: 1px solid var(--border-color);
        overflow: hidden;
        margin-bottom: 2rem;
      }

      .product-image {
        position: relative;
        overflow: hidden;
      }

      .product-image img {
        width: 100%;
        height: 400px;
        object-fit: cover;
        border-radius: 20px 20px 0 0;
        transition: transform 0.3s ease;
      }

      .product-image:hover img {
        transform: scale(1.05);
      }

      .wishlist-btn {
        position: absolute;
        top: 1rem;
        right: 1rem;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.9);
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        box-shadow: var(--shadow-md);
      }

      .wishlist-btn:hover {
        background: white;
        transform: scale(1.1);
      }

      .product-info {
        padding: 2rem;
      }

      .product-category {
        color: var(--primary-color);
        font-size: 0.9rem;
        font-weight: 500;
        margin-bottom: 0.5rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .product-title {
        font-size: 2rem;
        font-weight: 700;
        color: var(--dark-color);
        margin-bottom: 1rem;
        line-height: 1.2;
      }

      .rating-section {
        display: flex;
        align-items: center;
        margin-bottom: 1.5rem;
        gap: 1rem;
      }

      .stars {
        color: #fbbf24;
        font-size: 1.2rem;
      }

      .rating-count {
        color: #6b7280;
        font-size: 0.9rem;
      }

      .review-link {
        color: var(--primary-color);
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 500;
      }

      .review-link:hover {
        text-decoration: underline;
      }

      .product-price {
        font-size: 2.5rem;
        font-weight: 700;
        background: var(--pink-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 2rem;
      }

      .action-buttons {
        display: flex;
        gap: 1rem;
        margin-bottom: 2rem;
      }

      .btn-add-cart {
        flex: 1;
        background: var(--pink-gradient);
        border: none;
        color: white;
        padding: 1rem 2rem;
        border-radius: 12px;
        font-weight: 600;
        font-size: 1.1rem;
        transition: all 0.2s;
        box-shadow: var(--shadow-md);
      }

      .btn-add-cart:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-lg);
        color: white;
      }

      .btn-wishlist {
        width: 60px;
        height: 60px;
        border: 2px solid var(--border-color);
        background: white;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
      }

      .btn-wishlist:hover {
        border-color: var(--primary-color);
        background: var(--primary-color);
        color: white;
        transform: translateY(-2px);
      }

      .info-section {
        background: white;
        border-radius: 16px;
        box-shadow: var(--shadow-md);
        border: 1px solid var(--border-color);
        overflow: hidden;
      }

      .section-header {
        background: linear-gradient(135deg, #f8fafc, #e2e8f0);
        padding: 1.5rem;
        border-bottom: 1px solid var(--border-color);
      }

      .section-title {
        font-size: 1.3rem;
        font-weight: 600;
        color: var(--dark-color);
        margin: 0;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .section-content {
        padding: 2rem;
      }

      .description-text {
        color: #4b5563;
        line-height: 1.7;
        margin-bottom: 1.5rem;
      }

      .features-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      .features-list li {
        padding: 0.75rem 0;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .features-list li:last-child {
        border-bottom: none;
      }

      .feature-icon {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--success-color);
        flex-shrink: 0;
      }

      .shipping-info {
        background: #f0f9ff;
        border: 1px solid #bae6fd;
        border-radius: 12px;
        padding: 1.5rem;
      }

      .shipping-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.5rem 0;
      }

      .shipping-label {
        color: #374151;
        font-weight: 500;
      }

      .shipping-value {
        color: var(--primary-color);
        font-weight: 600;
      }

      .quality-badges {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.75rem;
      }

      .quality-badge {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 1rem;
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        border-radius: 8px;
      }

      .badge-icon {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: var(--success-color);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 0.8rem;
        flex-shrink: 0;
      }

      .badge-text {
        color: #166534;
        font-weight: 500;
        font-size: 0.9rem;
      }

      @media (max-width: 768px) {
        .product-title {
          font-size: 1.5rem;
        }

        .product-price {
          font-size: 2rem;
        }

        .action-buttons {
          flex-direction: column;
        }

        .btn-wishlist {
          width: 100%;
          height: 50px;
        }

        .product-image img {
          height: 300px;
        }
      }

      .fade-in {
        animation: fadeIn 0.6s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <div id="header-container"></div>

    <!-- Breadcrumb -->
    <div class="breadcrumb-nav">
      <div class="container">
        <a href="products.html" class="back-link">
          <i class="bi bi-arrow-left me-2"></i>
        </a>
      </div>
    </div>

    <div class="container">
      <div id="productDetail" class="row g-4"></div>
    </div>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/components/components.js"></script>
    <script src="../../js/user/product-detail.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const userRaw = localStorage.getItem("user");
        const user = userRaw ? JSON.parse(userRaw) : null;

        let headerPath = "../../components/header.html";
        const roles = user?.roles || [];

        if (roles.includes("Admin")) {
          headerPath = "../../components/header-admin.html";
        } else if (roles.includes("Customer")) {
          headerPath = "../../components/header-user.html";
        }

        console.log("➡️ Đang load:", headerPath);

        fetch(headerPath)
          .then((res) => res.text())
          .then((html) => {
            document.getElementById("header-container").innerHTML = html;

            const script = document.createElement("script");
            script.src = "../../js/Login/header-auth.js";
            script.onload = () => console.log("✅ header-auth.js loaded");
            document.body.appendChild(script);
          });
      });
    </script>
  </body>
</html>
