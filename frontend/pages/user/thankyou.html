<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Đặt hàng thành công</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/components.css" />
    <style>
      body {
        background-color: #f8f9fa;
      }
      .thankyou-box {
        max-width: 600px;
        margin: 80px auto;
        background: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        text-align: center;
      }
      .thankyou-icon {
        font-size: 60px;
        color: #28a745;
        margin-bottom: 20px;
      }
      .btn-custom {
        margin: 10px;
      }
    </style>
  </head>
  <body>
    <div class="thankyou-box">
      <div class="thankyou-icon">🎉</div>
      <h2 class="text-success">Đặt hàng thành công!</h2>
      <p>
        Cảm ơn bạn đã mua hàng tại <strong>PetShop</strong>. Đơn hàng của bạn
        đang được xử lý.
      </p>

      <div class="d-flex justify-content-center mt-4">
        <a href="products.html" class="btn btn-outline-primary btn-custom"
          >Tiếp tục mua hàng</a
        >
        <a href="order.html" class="btn btn-success btn-custom">Xem đơn hàng</a>
      </div>
    </div>
    <style>
      body {
        background: linear-gradient(135deg, #f9e7f4, #e6e0fa, #faf0e6);
        font-family: "Poppins", sans-serif;
        overflow-x: hidden;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }
      .thankyou-container {
        text-align: center;
        position: relative;
        z-index: 1;
      }
      .thankyou-box {
        background: linear-gradient(135deg, #fff0f5, #e6e0fa);
        border-radius: 20px;
        padding: 2.5rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        max-width: 700px;
        width: 90%;
        position: relative;
        animation: fadeIn 0.8s ease-in-out;
      }
      .thankyou-icon {
        position: relative;
      }
      .thankyou-icon .fas {
        font-size: 4rem;
        color: #ff6f91;
        animation: bounce 2s infinite;
      }
      .sparkle {
        position: absolute;
        top: -15px;
        left: 50%;
        transform: translateX(-50%);
        width: 25px;
        height: 25px;
        background: radial-gradient(circle, #fff, #ff6f91);
        border-radius: 50%;
        animation: sparkle 1.5s infinite;
      }
      h2.text-success {
        color: #ff6f91;
        font-size: 2.5rem;
        font-weight: 700;
        text-shadow: 1px 1px 5px rgba(255, 111, 145, 0.3);
        margin-top: 1.5rem;
      }
      p.lead {
        font-size: 1.2rem;
        color: #555;
        margin-bottom: 1rem;
      }
      p.text-muted {
        font-size: 1rem;
        margin-bottom: 2rem;
      }
      .btn-custom-paw {
        background: linear-gradient(45deg, #ff6f91, #d4a9e2);
        color: #fff;
        border: none;
        padding: 0.75rem 2rem;
        border-radius: 30px;
        font-weight: 600;
        text-transform: uppercase;
        transition: all 0.4s ease;
        position: relative;
        overflow: hidden;
        margin: 0 10px;
      }
      .btn-custom-paw::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        transition: width 0.6s ease, height 0.6s ease;
      }
      .btn-custom-paw:hover::before {
        width: 300px;
        height: 300px;
      }
      .btn-custom-paw:hover {
        transform: translateY(-3px) scale(1.1);
        box-shadow: 0 5px 15px rgba(255, 111, 145, 0.4);
      }
      .btn-custom-paw i {
        margin-right: 0.5rem;
      }
      .pet-decoration {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        pointer-events: none;
      }
      .pet-decoration .fas {
        position: absolute;
        opacity: 0.7;
        font-size: 3rem;
      }
      .pet-decoration .fa-dog {
        top: 10%;
        left: 5%;
        color: #ff9f9f;
        animation: bounce 2s infinite;
      }
      .pet-decoration .fa-cat {
        top: 20%;
        right: 5%;
        color: #e6e0fa;
        animation: bounce 2s infinite 0.5s;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes bounce {
        0%,
        20%,
        50%,
        80%,
        100% {
          transform: translateY(0);
        }
        40% {
          transform: translateY(-10px);
        }
        60% {
          transform: translateY(-5px);
        }
      }
      @keyframes sparkle {
        0% {
          opacity: 0.5;
          transform: scale(0.5);
        }
        50% {
          opacity: 1;
          transform: scale(1.2);
        }
        100% {
          opacity: 0.5;
          transform: scale(0.5);
        }
      }

      @media (max-width: 768px) {
        .thankyou-box {
          padding: 1.5rem;
        }
        h2.text-success {
          font-size: 2rem;
        }
        .btn-custom-paw {
          padding: 0.5rem 1.5rem;
        }
        .pet-decoration .fas {
          font-size: 2rem;
        }
      }
    </style>
  </body>
</html>
