<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Đánh giá của tôi | Shopping Pet</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="../../css/components.css" />
  </head>
  <body>
    <div id="header-container"></div>
    <div class="container my-5">
      <h2 class="mb-4">✍️ Đánh giá của tôi</h2>
      <div id="reviewList">Đang tải...</div>
    </div>

    <div id="footer-container"></div>
    <script src="../../js/components/components.js"></script>
    <script src="../../js/user/my-reviews.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const userRaw = localStorage.getItem("user");
        const user = userRaw ? JSON.parse(userRaw) : null;

        let headerPath = "../../components/header.html";
        const roles = user?.roles || [];

        if (roles.includes("Admin")) {
          headerPath = "../../components/header-admin.html";
        } else if (roles.includes("Customer")) {
          headerPath = "../../components/header-user.html";
        }

        console.log("➡️ Đang load:", headerPath);

        fetch(headerPath)
          .then((res) => res.text())
          .then((html) => {
            document.getElementById("header-container").innerHTML = html;

            const script = document.createElement("script");
            script.src = "../../js/Login/header-auth.js";
            script.onload = () => console.log("✅ header-auth.js loaded");
            document.body.appendChild(script);
          });
      });
    </script>
  </body>
</html>
