<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Đánh giá sản phẩm | Shopping Pet</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <link rel="stylesheet" href="../../css/components.css" />
    <link rel="stylesheet" href="../../css/user/review.css" />
  </head>
  <body>
    <div id="header-container"></div>

    <div class="container my-4">
      <div class="row g-3 align-items-stretch flex-nowrap">
        <div class="col-12 col-md-4">
          <div class="card product-card shadow-sm h-100">
            <img
              id="productImage"
              src="/images/default.jpg"
              class="card-img-top"
              alt="Ảnh sản phẩm"
              height="300"
            />
            <div class="card-body text-center p-3">
              <h5 id="productName" class="fw-bold mb-1">Tên sản phẩm</h5>
              <p id="productPrice" class="text-success fw-semibold mb-1">
                <i class="bi bi-cash-coin"></i> Giá: 0đ
              </p>
              <p id="productDescription" class="small text-muted mb-0">
                <i class="bi bi-card-text"></i> Mô tả: Không có
              </p>
            </div>
          </div>
        </div>

        <div class="col-12 col-md-8">
          <div class="card review-card shadow-sm h-100">
            <div
              class="card-header bg-light d-flex justify-content-between align-items-center p-2"
            >
              <div>
                <i class="fas fa-comment-alt text-primary me-2"></i>
                <strong>Đánh giá (<span id="reviewCount">0</span>)</strong>
              </div>
              <ul class="nav nav-tabs card-header-tabs" id="reviewTabs">
                <li class="nav-item">
                  <a
                    class="nav-link active"
                    data-bs-toggle="tab"
                    href="#tabReviews"
                    >Tất cả</a
                  >
                </li>
                <li class="nav-item">
                  <a
                    class="nav-link"
                    data-bs-toggle="tab"
                    href="#tabWriteReview"
                    >Viết đánh giá</a
                  >
                </li>
              </ul>
            </div>
            <div class="card-body tab-content p-3">
              <div class="tab-pane fade show active" id="tabReviews">
                <div id="reviewList" class="review-list">
                  Đang tải đánh giá...
                </div>
              </div>

              <div class="tab-pane fade" id="tabWriteReview">
                <form id="reviewForm" class="mt-3">
                  <div class="mb-3">
                    <label class="form-label">Chọn số sao</label>
                    <div id="starRating" class="mb-2">
                      <i
                        class="fas fa-star text-gray fs-4 me-1"
                        data-value="1"
                      ></i>
                      <i
                        class="fas fa-star text-gray fs-4 me-1"
                        data-value="2"
                      ></i>
                      <i
                        class="fas fa-star text-gray fs-4 me-1"
                        data-value="3"
                      ></i>
                      <i
                        class="fas fa-star text-gray fs-4 me-1"
                        data-value="4"
                      ></i>
                      <i
                        class="fas fa-star text-gray fs-4 me-1"
                        data-value="5"
                      ></i>
                    </div>
                    <input type="hidden" id="rating" value="0" />
                  </div>
                  <div class="mb-3">
                    <label for="comment" class="form-label">Nội dung</label>
                    <textarea
                      id="comment"
                      class="form-control"
                      placeholder="Hãy chia sẻ trải nghiệm của bạn..."
                      required
                      style="min-height: 120px"
                    ></textarea>
                  </div>
                  <button class="btn btn-primary w-100" type="submit">
                    <i class="fas fa-paper-plane"></i> Gửi đánh giá
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="footer-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/components/components.js"></script>
    <script src="../../js/user/review.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const userRaw = localStorage.getItem("user");
        const user = userRaw ? JSON.parse(userRaw) : null;

        let headerPath = "../../components/header.html";
        const roles = user?.roles || [];

        if (roles.includes("Admin")) {
          headerPath = "../../components/header-admin.html";
        } else if (roles.includes("Customer")) {
          headerPath = "../../components/header-user.html";
        }

        console.log("➡️ Đang load:", headerPath);

        fetch(headerPath)
          .then((res) => res.text())
          .then((html) => {
            document.getElementById("header-container").innerHTML = html;

            const script = document.createElement("script");
            script.src = "../../js/Login/header-auth.js";
            script.onload = () => console.log("✅ header-auth.js loaded");
            document.body.appendChild(script);
          });
      });
    </script>
  </body>
</html>
