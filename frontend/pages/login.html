<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Shopping Pet</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/login.css" />
  </head>
  <body>
    <div class="container" id="container">
      <div class="form-container sign-up">
        <form id="registerForm">
          <h1>Tạo tài khoản</h1>
          <div class="social-icons">
            <a href="#" class="icon"><i class="fab fa-google-plus-g"></i></a>
            <a href="#" class="icon"><i class="fab fa-facebook-f"></i></a>
            <a href="#" class="icon"><i class="fab fa-github"></i></a>
            <a href="#" class="icon"><i class="fab fa-linkedin-in"></i></a>
          </div>
          <span>hoặc dùng email để đăng ký</span>
          <input type="text" id="fullname" placeholder="Tên của bạn" />
          <input type="email" id="reg-email" placeholder="Email" />
          <input type="password" id="reg-password" placeholder="Mật khẩu" />
          <input
            type="password"
            id="confirmPassword"
            placeholder="Nhập lại mật khẩu"
          />

          <button type="submit">Đăng ký</button>
        </form>
      </div>
      <div class="form-container sign-in">
        <form id="loginForm">
          <h1>Đăng nhập</h1>
          <div class="social-icons">
            <a href="#" class="icon"><i class="fab fa-google-plus-g"></i></a>
            <a href="#" class="icon"><i class="fab fa-facebook-f"></i></a>
            <a href="#" class="icon"><i class="fab fa-github"></i></a>
            <a href="#" class="icon"><i class="fab fa-linkedin-in"></i></a>
          </div>
          <span>hoặc dùng email và mật khẩu</span>
          <input type="email" id="email" placeholder="Email" />
          <input type="password" id="password" placeholder="Mật khẩu" />

          <a href="#">Quên mật khẩu?</a>
          <button>Đăng nhập</button>
        </form>
      </div>
      <div class="toggle-container">
        <div class="toggle">
          <div class="toggle-panel toggle-left">
            <h1>Chào mừng trở lại!</h1>
            <p>Hãy đăng nhập để sử dụng các tính năng của hệ thống</p>
            <button class="hidden" id="login">Đăng nhập</button>
          </div>
          <div class="toggle-panel toggle-right">
            <h1>Xin chào!</h1>
            <p>Đăng ký tài khoản mới để bắt đầu trải nghiệm</p>
            <button class="hidden" id="register">Đăng ký</button>
          </div>
        </div>
      </div>
    </div>
    <script src="../js/Login/Login.js"></script>
  </body>
</html>
