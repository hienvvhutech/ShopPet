<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Thông tin cá nhân | Shopping Pet</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="../../css/components.css" />
  </head>
  <body>
    <div id="header-container"></div>
    <div class="container my-5">
      <h2 class="mb-4">👤 Thông tin cá nhân</h2>
      <form id="profileForm">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Họ tên</label>
            <input type="text" class="form-control" id="fullName" required />
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Số điện thoại</label>
            <input type="text" class="form-control" id="phone" />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="email" disabled />
        </div>

        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label">Tỉnh / TP</label>
            <select id="province" class="form-select"></select>
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Quận / Huyện</label>
            <select id="district" class="form-select"></select>
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Phường / Xã</label>
            <select id="ward" class="form-select"></select>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Ngày tạo</label>
          <input type="text" class="form-control" id="createdAt" disabled />
        </div>

        <button type="submit" class="btn btn-primary">💾 Lưu thay đổi</button>
      </form>
      <div id="updateMsg" class="mt-3 fw-bold"></div>
    </div>
    <script>
      fetch("/components/header-user.html")
        .then((res) => res.text())
        .then(
          (data) =>
            (document.getElementById("header-container").innerHTML = data)
        );
    </script>
    <script src="../../js/user/profile.js"></script>
  </body>
</html>
