<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Sửa sản phẩm | Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <h2 class="mb-4">✏️ Sửa sản phẩm</h2>
      <form
        id="editProductForm"
        enctype="multipart/form-data"
        style="max-width: 600px"
      >
        <div class="mb-3">
          <label for="name" class="form-label">Tên sản phẩm</label>
          <input type="text" class="form-control" id="name" required />
        </div>
        <div class="mb-3">
          <label for="description" class="form-label">Mô tả</label>
          <textarea class="form-control" id="description" rows="3"></textarea>
        </div>
        <div class="mb-3">
          <label for="price" class="form-label">Giá</label>
          <input type="number" class="form-control" id="price" required />
        </div>
        <div class="mb-3">
          <label for="stockQuantity" class="form-label">Số lượng kho</label>
          <input
            type="number"
            class="form-control"
            id="stockQuantity"
            required
          />
        </div>
        <div class="mb-3">
          <label for="categorySelect" class="form-label">Danh mục</label>
          <select id="categorySelect" class="form-select" required></select>
        </div>
        <div class="mb-3">
          <input type="file" class="form-control" id="image" accept="image/*" />
          <img
            id="currentImage"
            src="#"
            width="120"
            class="img-thumbnail mb-3"
          />
        </div>
        <div id="alertBox" class="alert d-none"></div>
        <button type="submit" class="btn btn-primary">Cập nhật</button>
        <a href="admin-product.html" class="btn btn-secondary">⬅ Quay lại</a>
      </form>
    </div>

    <script src="../../../js/Admin/product.js"></script>
  </body>
</html>
