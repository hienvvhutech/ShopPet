<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sửa danh mục | Admin</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <h2 class="mb-4">📝 Sửa danh mục</h2>
      <form id="editCategoryForm" style="max-width: 600px">
        <div class="mb-3">
          <label for="editCategoryName" class="form-label">Tên danh mục</label>
          <input
            type="text"
            id="editCategoryName"
            class="form-control"
            required
          />
        </div>
        <div class="mb-3">
          <label for="editCategoryDescription" class="form-label">Mô tả</label>
          <textarea
            id="editCategoryDescription"
            class="form-control"
            rows="3"
          ></textarea>
        </div>
        <div id="alertBox" class="alert d-none"></div>
        <button type="submit" class="btn btn-primary">💾 Cập nhật</button>
        <a href="admin-category.html" class="btn btn-secondary">⬅️ Quay lại</a>
      </form>
    </div>

    <script src="../../../js/Admin/category.js"></script>
  </body>
</html>
