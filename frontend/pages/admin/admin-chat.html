<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Admin | Quản lý Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="../../css/style.css" />
    <style>
      .chat-container {
        background-color: #f9f9f9;
        border-radius: 8px;
        padding: 15px;
        height: 400px;
        overflow-y: auto;
      }

      .chat-message {
        margin-bottom: 10px;
        padding: 10px 15px;
        border-radius: 20px;
        max-width: 70%;
        word-wrap: break-word;
      }

      .chat-message.admin {
        background-color: #625203;
        align-self: flex-end;
        margin-left: auto;
        text-align: right;
      }

      .chat-message.customer {
        background-color: blue;
        align-self: flex-start;
        margin-right: auto;
        text-align: left;
      }

      .user-list-item {
        padding: 8px;
        cursor: pointer;
        border-bottom: 1px solid #d2bd00;
      }

      .user-list-item:hover {
        background-color: #0168d0;
      }
      .col-md-8 {
        background-color: #cccccc;
      }
      .chat-container {
        background-color: #cccccc;
        border-radius: 8px;
        padding: 15px;
        height: 400px;
        overflow-y: auto;
      }
    </style>
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <div class="col-3 p-0" id="header-container"></div>
        <div class="col-9 py-4 px-5">
          <h3>💬 Quản lý tin nhắn khách hàng</h3>
          <div class="row mt-4">
            <div class="col-md-4">
              <h5>📋 Danh sách khách hàng</h5>
              <div
                id="userList"
                class="border p-2"
                style="height: 400px; overflow-y: auto"
              ></div>
            </div>
            <div class="col-md-8 d-flex flex-column">
              <div id="chatTitle" class="fw-bold mb-2">💬 Chưa chọn khách</div>
              <div
                id="chatMessages"
                class="chat-container d-flex flex-column border mb-2"
              ></div>
              <div class="input-group">
                <input
                  id="chatInput"
                  class="form-control"
                  placeholder="Nhập nội dung..."
                />
                <button class="btn btn-primary" onclick="sendMessage()">
                  Gửi
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const userRaw = localStorage.getItem("user");
      const user = userRaw ? JSON.parse(userRaw) : null;

      let headerPath = "/components/header.html";
      const roles = user?.roles || [];

      if (roles.includes("Admin")) {
        headerPath = "/components/header-admin.html";
      } else if (roles.includes("Customer")) {
        headerPath = "/components/header-user.html";
      }

      fetch(headerPath)
        .then((res) => res.text())
        .then((html) => {
          document.getElementById("header-container").innerHTML = html;
          const script = document.createElement("script");
          script.src = "/js/Login/header-auth.js";
          document.body.appendChild(script);
        });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>
    <script src="/js/Admin/chat.js"></script>
  </body>
</html>
